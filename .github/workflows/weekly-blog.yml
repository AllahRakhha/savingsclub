name: Weekly Blog Post Generator

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  generate-post:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node generate-post.js

      - name: Commit and push new post
        run: |
          git config user.name "SavingsClub Bot"
          git config user.email "bot@savingsclub.com"
          git add -A
          git diff --staged --quiet || git commit -m "📝 Auto-generated weekly blog post - $(date +'%B %d, %Y')"
          git push
